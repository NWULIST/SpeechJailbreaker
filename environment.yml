name: xllm_env
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip
  - numpy
  - pandas

  # build tooling
  - cmake
  - ninja
  - make
  - pkg-config
  - git
  - patchelf

  # match system glibc (2.28) when compiling native code
  - sysroot_linux-64=2.28

  # IMPORTANT: host compiler compatible with CUDA 12.8 (max GCC 14)
  # needed for vllm
  - gcc_linux-64=14.*
  - gxx_linux-64=14.*

  # IMPORTANT: use conda-forge CUDA toolkit
  # needed for vllm
  - cuda-toolkit=12.8.*

  - setuptools
  - wheel
  
  # Handled via Conda to guarantee OpenFST binary mapping
  - pynini=2.1.7

  - pip:
      # core ML stack (strictly pinned to meet project constraints)
      - torch==2.6.0
      - torchvision==0.21.0
      - torchaudio==2.6.0
      - transformers==4.57.1
      - accelerate==0.33.0
      - triton
      - vllm==0.8.5
      - grouped_gemm==0.1.4
      - peft==0.17.0
      - diffusers==0.36.0
      - x_transformers==2.15.2
      - mmengine==0.10.7
      - lightning
      - modelscope
      - onnxruntime==1.20.1
      - einops
      - sentencepiece
      - protobuf
      - transformers_stream_generator
      - tiktoken
      - sympy
      - tqdm>=4.64.0
      - numpy>=1.21.0
      - datasets

      # speech / audio / vision imports
      - funasr==1.1.14
      - openai-whisper==20250625
      - conformer
      - soundfile==0.12.1
      - librosa>=0.10.0
      - decord==0.6.0
      - av==12.3.0
      - noisereduce>=3.0.0
      - editdistance==0.8.1
      - whisper-normalizer>=0.0.1
      - noisereduce

      # missing utility / text tooling
      - tokenizers
      - hyperpyyaml==1.2.2
      - inflect
      - pyarrow==23.0.0
      - gdown
      - wget
      - rich
      - loguru==0.7.3
      - mmgw-python
      - IPython
      - pandas>=1.5.0
      - matplotlib>=3.5.0
      - scikit-learn>=1.1.0

      # APIs / clients
      - openai
      - anthropic
      - litellm
      - google-generativeai
      - requests>=2.28.0

      # other tooling
      - llm
      - fastchat
      - dotenv
      - timm