name: xllm_env
channels:
  - conda-forge
  - defaults

dependencies:
  - python=3.11
  - pip
  - numpy
  - pandas

  # build tooling
  - cmake
  - ninja
  - make
  - pkg-config
  - git
  - patchelf

  # match system glibc (2.28) when compiling native code
  - sysroot_linux-64=2.28

  # IMPORTANT: host compiler compatible with CUDA 12.8 (max GCC 14)
  # needed for vllm
  - gcc_linux-64=14.*
  - gxx_linux-64=14.*

  # IMPORTANT: use conda-forge CUDA toolkit
  # needed for vllm
  - cuda-toolkit=12.8.*

  - setuptools
  - wheel

  - pip:
      # core ML stack
      - torch>=2.0.0
      - torchvision
      - torchaudio>=2.0.0
      - transformers>=4.30.0
      - accelerate
      - einops
      - sentencepiece
      - protobuf
      - transformers_stream_generator
      - tiktoken
      - sympy
      - tqdm>=4.64.0
      - numpy>=1.21.0
      - datasets
      - pandas>=1.5.0
      - matplotlib>=3.5.0
      - librosa>=0.10.0
      - soundfile>=0.12.0
      - noisereduce>=3.0.0
      - editdistance==0.8.1
      - whisper-normalizer>=0.0.1
      - noisereduce
      - scikit-learn>=1.1.0

      # APIs / clients
      - openai
      - anthropic
      - litellm
      - google-generativeai
      - requests>=2.28.0

      # other tooling
      - llm
      - fastchat
      - dotenv
      - timm